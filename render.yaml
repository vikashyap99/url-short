services:
  - type: web
    name: url-shortener
    runtime: node
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGIN
        value: "*"
